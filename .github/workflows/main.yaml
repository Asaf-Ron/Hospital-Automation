name: QA Automation CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright allure-pytest
          python -m playwright install --with-deps

      - name: Install Allure commandline
        run: npm install -g allure-commandline

      - name: Clean caches and test artifacts
        run: |
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          rm -rf allure-results allure-report

      - name: Checkout gh-pages branch for history
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          path: gh-pages
          ref: gh-pages
        continue-on-error: true

      - name: Restore Allure history if available
        run: |
          mkdir -p allure-results
          if [ -d gh-pages/history ]; then
            cp -R gh-pages/history allure-results/
          fi

      - name: Run Playwright tests
        run: pytest -p no:asyncio --alluredir=allure-results

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure report to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./allure-report
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
